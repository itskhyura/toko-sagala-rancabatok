<!DOCTYPE html>
<html>
<head>
<title>Toko Sagala</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

#cart{
position:fixed;
bottom:20px;
right:20px;
background:orange;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<h1>🏪 Toko Sagala</h1>

<div class="card">
<h3>Indomie Goreng</h3>
<p>Rp 3.000</p>
<button onclick="addCart('Indomie Goreng',3000)">
Tambah
</button>
</div>

<div class="card">
<h3>Minyak Kita 1L</h3>
<p>Rp 18.000</p>
<button onclick="addCart('Minyak Kita',18000)">
Tambah
</button>
</div>

<div class="card">
<h3>Gula 1 Kg</h3>
<p>Rp 18.000</p>
<button onclick="addCart('Gula',18000)">
Tambah
</button>
</div>

<div id="cart" onclick="checkout()">
🛒 <span id="jumlah">0</span>
</div>

<script>

let cart = [];

function addCart(nama,harga){

cart.push({
nama:nama,
harga:harga
});

document.getElementById("jumlah").innerText = cart.length;

alert(nama + " ditambahkan");
}

function checkout(){

if(cart.length == 0){
alert("Keranjang masih kosong");
return;
}

let nama = prompt("Masukkan nama");

if(!nama){
return;
}

let alamat = prompt("Masukkan alamat");

if(!alamat){
return;
}

let total = 0;

let pesan =
"Halo Toko Sagala%0A%0A";

pesan += "Nama: " + nama + "%0A";
pesan += "Alamat: " + alamat + "%0A%0A";

pesan += "Pesanan:%0A";

cart.forEach(item=>{

pesan +=
"- " +
item.nama +
" Rp" +
item.harga +
"%0A";

total += item.harga;

});

if(total < 25000){

alert(
"Minimal belanja Rp25.000"
);

return;

}

pesan +=
"%0ATotal Belanja: Rp" +
total;

window.open(
"https://wa.me/62881023257951?text=" +
pesan
);

}

</script>

</body>
</html>
