<body>

<h1>🏪 Toko Sagala</h1>
  <input

border:1px solid #ccc;
">

<div id="totalBox">
Total: Rp <span id="total">0</span>
</div>

<div id="produk"></div>
  
<div id="cart" onclick="checkout()">
🛒 <span id="jumlah">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

let cart = [];
let semuaProduk = [];
  
  fetch("Toko%20Sagala%20Produk%20-%20web.csv")
.then(response => response.text())
.then(csv => {

const hasil = Papa.parse(csv,{
header:true
});

const container =
document.getElementById("produk");
  
semuaProduk = hasil.data;

}

container.innerHTML += `
<div class="card">
<h3>${item["Nama Produk"]}</h3>

<p>
Rp ${Number(item.Harga).toLocaleString("id-ID")}
</p>

<button onclick="addCart('${item["Nama Produk"]}',${item.Harga})">
+
</button>

<button onclick="kurangCart('${item["Nama Produk"]}')">
-
</button>

</div>
`;

});

});

function tampilkanProduk(data){

const container =
document.getElementById("produk");

semuaProduk = hasil.data;

tampilkanProduk(hasil.data);

});

}  

document.getElementById("search")
.addEventListener("input", function(){

let keyword =
this.value.toLowerCase();

let hasilFilter =
semuaProduk.filter(item =>

item["Nama Produk"]
.toLowerCase()
.includes(keyword)

);

tampilkanProduk(hasilFilter);

});
  
function addCart(nama,harga){

let item = cart.find(
x => x.nama === nama
);

if(item){

item.qty++;

}else{

cart.push({
nama:nama,
harga:harga,
qty:1
});

}

updateCart();

}
  function kurangCart(nama){

let item = cart.find(
x => x.nama === nama
);

if(!item) return;

item.qty--;

if(item.qty <= 0){

cart = cart.filter(
x => x.nama !== nama
);

}

updateCart();

}

function updateCart(){

let jumlah = 0;
let total = 0;

cart.forEach(item=>{

jumlah += item.qty;

total += item.qty * item.harga;

});

document.getElementById("jumlah").innerText = jumlah;

document.getElementById("total").innerText =
total.toLocaleString("id-ID");

}

function checkout(){

if(cart.length == 0){
alert("Keranjang masih kosong");
return;
}

let nama = prompt("Masukkan nama");

if(!nama){
return;
}

let alamat = prompt("Masukkan alamat");

if(!alamat){
return;
}

let total = 0;

let pesan =
"Halo Toko Sagala%0A%0A";

pesan += "Nama: " + nama + "%0A";
pesan += "Alamat: " + alamat + "%0A%0A";

pesan += "Pesanan:%0A";

cart.forEach(item=>{

pesan +=
"- " +
item.nama +
" x" +
item.qty +
" Rp" +
(item.qty * item.harga) +
"%0A";

total += item.qty * item.harga;

});

if(total < 25000){

alert(
"Minimal belanja Rp25.000"
);

return;

}

pesan +=
"%0ATotal Belanja: Rp" +
total;

window.open(
"https://wa.me/62881023257951?text=" +
pesan
);

}

</script>

</body>
</html>
